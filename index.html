<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1e293b;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
    }

    .bot-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .header-info h1 {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .header-info p {
      font-size: 12px;
      color: #64748b;
    }

    .status {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #22c55e;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── User ID Bar ── */
    .user-bar {
      background: #1e293b;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #334155;
    }

    .user-bar label {
      font-size: 13px;
      color: #94a3b8;
      white-space: nowrap;
    }

    .user-bar input {
      background: #0f172a;
      border: 1px solid #334155;
      color: #f1f5f9;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      width: 180px;
      outline: none;
    }

    .user-bar input:focus {
      border-color: #3b82f6;
    }

    /* ── Chat Area ── */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-track { background: transparent; }
    #chat-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot {
      align-self: flex-start;
    }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
    }

    .message.bot .avatar {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 100%;
    }

    .message.user .bubble {
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #1e293b;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
      border: 1px solid #334155;
    }

    .bubble .time {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .message.user .bubble .time {
      color: #bfdbfe;
      text-align: right;
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 8px; height: 8px;
      background: #64748b;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #475569;
    }

    .welcome .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .welcome h2 {
      font-size: 20px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* Suggested questions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    .suggestion-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      border-color: #3b82f6;
      color: #3b82f6;
    }

    /* ── Input Bar ── */
    .input-bar {
      padding: 16px 24px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      color: #f1f5f9;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #user-input:focus {
      border-color: #3b82f6;
    }

    #user-input::placeholder {
      color: #475569;
    }

    #send-btn {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border: none;
      color: white;
      width: 44px; height: 44px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:hover { opacity: 0.9; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="bot-avatar">🤖</div>
    <div class="header-info">
      <h1>Study Bot</h1>
      <p>AI-Powered Study Assistant</p>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Online
    </div>
  </header>

  <!-- User ID Bar -->
  <div class="user-bar">
    <label>Your ID:</label>
    <input type="text" id="user-id" value="student1" placeholder="Enter your user ID" />
    <span style="font-size:12px; color:#475569;">
      💡 Change your ID to start a fresh conversation
    </span>
  </div>

  <!-- Chat Box -->
  <div id="chat-box">
    <div class="welcome">
      <div class="icon">📚</div>
      <h2>Hello! I'm Study Bot</h2>
      <p>Ask me anything about your studies.<br/>I remember our conversations!</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What is photosynthesis?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Explain Newton's laws</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What is machine learning?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">How does DNA work?</button>
      </div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <textarea id="user-input" rows="1"
      placeholder="Ask me anything about your studies..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const input   = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function getTime() {
      return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function clearWelcome() {
      const welcome = chatBox.querySelector('.welcome');
      if (welcome) welcome.remove();
    }

    function appendMessage(role, text) {
      clearWelcome();
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="bubble">
          ${text.replace(/\n/g, '<br/>')}
          <div class="time">${getTime()}</div>
        </div>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function showTyping() {
      clearWelcome();
      const div = document.createElement('div');
      div.className = 'message bot typing';
      div.id = 'typing-indicator';
      div.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    function sendSuggestion(btn) {
      input.value = btn.textContent;
      sendMessage();
    }

    async function sendMessage() {
      const message = input.value.trim();
      const userId  = document.getElementById('user-id').value.trim() || 'student1';
      if (!message) return;

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      appendMessage('user', message);
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, message: message })
        });

        const data = await res.json();
        hideTyping();

        if (res.ok) {
          appendMessage('bot', data.bot_response);
        } else {
          appendMessage('bot', '⚠️ Sorry, something went wrong. Please try again.');
        }
      } catch (err) {
        hideTyping();
        appendMessage('bot', '⚠️ Could not connect to the server. Make sure the API is running.');
      }

      sendBtn.disabled = false;
      input.focus();
    }
  </script>

</body>
</html>
